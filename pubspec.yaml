# pubspec.yaml  (UPDATED — adds http package for Claude API calls)
name: prescription_reader
description: "AI-powered prescription reader with Layer 1 OCR + Layer 2 AI interpretation."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  sqflite: ^2.3.3
  path: ^1.9.0
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.13.0
  flutter_dotenv: ^5.1.0
  image_cropper: ^8.0.1
  http: ^1.6.0
  path_provider: ^2.1.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/db/medicines.db